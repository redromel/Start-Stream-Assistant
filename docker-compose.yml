version: '3.8'

services:
  start-stream-asst:
    build: .
    container_name: start-stream-assistant
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "0.0.0.0::8080" 
    env_file:
      - .env
    volumes:
      - .:/app  
    working_dir: /app/src 
    command: python main.py
    restart: "no"
